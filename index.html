<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List Assignment</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black">
    <h1 class="text-center text-[29px] text-white flex  justify-center pt-[33px]"> Calculator</h1>
    <div class="felx justify-center text-center pt-[30px]">
        <input type="number" placeholder="Enter Number" class="number1 px-[40px] py-[15px]">
        <input type="number" placeholder="Enter Number" class="number2 px-[40px] py-[15px]">
    </div>
    <div class="flex justify-center text-center pt-[30px] text-white ">
        <button class="add bg-white text-black px-5 gap-[30px]">+</button>
        <button class="subtract bg-white text-black px-5">-</button>
        <button class="multiply bg-white text-black px-5">*</button>
        <button class="divide bg-white text-black px-5">/</button>
    </div>
    <div>
        <p class=" output felx justify-center text-center bg-white mt-[50px] mx-[500px] py-[20px]">Result</p>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
